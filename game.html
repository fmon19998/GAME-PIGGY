<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5d0500" />
  <meta name="description" content="Piggy Gold Target — pilih satu celengan emas, bidik, lalu tembak." />
  <title>Piggy Gold Target — Play</title>
  <link rel="icon" href="piggy-gold-logo.png" />
  <link rel="stylesheet" href="game.css?v=27" />
</head>
<body>
  <div class="loading-screen" id="loadingScreen" aria-live="polite">
    <img src="piggy-gold-logo.png" alt="Piggy Gold" />
    <div class="loading-bar"><span id="loadingProgress"></span></div>
    <p id="loadingText">Memuat permainan...</p>
  </div>

  <main class="game-shell" id="gameShell">
    <div class="portrait-stage" id="stage">
      <section class="scene start-scene is-active" id="startScene" aria-label="Layar mulai">
        <img src="start-screen.png" alt="Piggy Gold Target" draggable="false" />
        <button class="hotspot start-button" id="startButton" type="button" aria-label="Mulai permainan"></button>
        <div class="start-tip">TEKAN START</div>
      </section>

      <section class="scene play-scene" id="playScene" aria-label="Permainan Piggy Gold">
        <img class="game-background" src="gameplay-screen.png" alt="Enam target Piggy Gold" draggable="false" />
        <div class="money-mask" aria-hidden="true"></div>

        <div class="ambient-stage" aria-hidden="true">
          <span class="lantern-aura lantern-aura-left"></span>
          <span class="lantern-aura lantern-aura-right"></span>
          <span class="light-sweep"></span>
          <div class="floating-coins" id="floatingCoins"></div>
        </div>

        <div class="cannon-well" aria-hidden="true"></div>
        <div class="cannon-rig" id="cannonRig" aria-hidden="true">
          <div class="cannon-recoil" id="cannonRecoil">
            <img src="cannon-sprite.png" alt="" draggable="false" />
            <span class="cannon-energy"></span>
          </div>
        </div>

        <div class="top-panel">
          <div class="profile-chip" id="profileChip">PEMAIN TAMU</div>
          <div class="tools">
            <button id="soundButton" type="button" aria-label="Matikan suara">🔊</button>
            <button id="resetButton" type="button" aria-label="Ulang permainan">↻</button>
            <button id="exitButton" type="button" aria-label="Keluar">↪</button>
          </div>
        </div>

        <div class="status-banner" id="statusBanner">PILIH 1 DARI 6 PIGGIES</div>

        <div class="target-layer" id="targetLayer">
          <button class="pig-target pig-target-1" data-pig="1" type="button" aria-label="Pilih Piggy 1"><span>1</span></button>
          <button class="pig-target pig-target-2" data-pig="2" type="button" aria-label="Pilih Piggy 2"><span>2</span></button>
          <button class="pig-target pig-target-3" data-pig="3" type="button" aria-label="Pilih Piggy 3"><span>3</span></button>
          <button class="pig-target pig-target-4" data-pig="4" type="button" aria-label="Pilih Piggy 4"><span>4</span></button>
          <button class="pig-target pig-target-5" data-pig="5" type="button" aria-label="Pilih Piggy 5"><span>5</span></button>
          <button class="pig-target pig-target-6" data-pig="6" type="button" aria-label="Pilih Piggy 6"><span>6</span></button>
        </div>

        <div class="aim-beam" id="aimBeam" aria-hidden="true"></div>
        <div class="crosshair" id="crosshair" aria-hidden="true"><span></span></div>
        <div class="muzzle-glow" id="muzzleGlow" aria-hidden="true"></div>
        <div class="projectile" id="projectile" aria-hidden="true"></div>
        <div class="impact-flash" id="impactFlash" aria-hidden="true"></div>
        <div class="impact-ring" id="impactRing" aria-hidden="true"></div>
        <div class="crack-overlay" id="crackOverlay" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="broken-pig" id="brokenPig" aria-hidden="true">
          <span class="broken-core"></span>
          <span class="fragment f1"></span><span class="fragment f2"></span><span class="fragment f3"></span>
          <span class="fragment f4"></span><span class="fragment f5"></span><span class="fragment f6"></span><span class="fragment f7"></span><span class="fragment f8"></span><span class="fragment f9"></span><span class="fragment f10"></span><span class="coin-frag c1"></span><span class="coin-frag c2"></span><span class="coin-frag c3"></span><span class="coin-frag c4"></span>
        </div>
        <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>
        <div class="floating-result" id="floatingResult" aria-hidden="true"></div>

        <button class="hotspot shoot-button" id="shootButton" type="button" aria-label="Tembak" disabled></button>
        <div class="shoot-hint" id="shootHint">PILIH TARGET DAHULU</div>
      </section>
    </div>
  </main>

  <section class="result-overlay is-hidden" id="resultOverlay" role="dialog" aria-modal="true" aria-labelledby="resultText">
    <div class="result-backdrop"></div>

    <div class="result-card result-win is-hidden" id="winResult">
      <img src="win-screen.png" alt="Selamat, Anda mendapatkan hadiah" draggable="false" />
      <div class="prize-cover" id="prizeCover">5.000</div>
      <button class="hotspot win-claim" id="winClaimButton" type="button" aria-label="Klaim hadiah"></button>
      <a class="admin-chat-button" id="adminChatButton" href="https://t.me/pusat_officialbot" target="_blank" rel="noopener noreferrer" aria-label="Chat petugas admin penyelenggara">CHAT PETUGAS ADMIN PENYELENGGARA</a>
    </div>

    <div class="result-card result-zonk is-hidden" id="zonkResult">
      <img src="zonk-screen.png" alt="Anda kurang beruntung, ZONK" draggable="false" />
      <button class="hotspot zonk-claim" id="zonkClaimButton" type="button" aria-label="Tutup hasil"></button>
    </div>

    <div class="result-actions">
      <button id="playAgainButton" type="button">MAIN ULANG</button>
      <button id="backButton" type="button">KEMBALI KE LOGIN</button>
    </div>
    <p class="sr-only" id="resultText"></p>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="game.js?v=27"></script>
</body>
</html>
